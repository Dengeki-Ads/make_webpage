baseURL = 'https://omugiwakaba.com/'
languageCode = 'ja'
title = 'キューラボ'
defaultContentLanguage = 'ja'

[params]
  description = '今話題の商品を紹介'
  author = 'サイト管理者'

[taxonomies]
  category = 'categories'
  tag = 'tags'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[outputs]
  home = ['HTML', 'RSS']

[sitemap]
  changefreq = 'weekly'
  priority = 0.5

[pagination]
  pagerSize = 20

[permalinks]
  articles = '/:slug/'
